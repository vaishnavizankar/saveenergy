# ============================================================
# SaveEnergy - Docker Compose (Local Frontend Dev Only)
# 
# Backend  → Hosted on AWS App Runner
# Database → Hosted on AWS RDS
# Frontend → Run locally for development, or deploy via S3/CloudFront
# ============================================================

services:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        # Points to AWS App Runner backend (update after terraform apply)
        VITE_API_BASE_URL: "https://${APP_RUNNER_URL}/api/v1"
        VITE_AWS_REGION: "us-east-1"
        VITE_COGNITO_USER_POOL_ID: "us-east-1_GNxIumfQJ"
        VITE_COGNITO_CLIENT_ID: "4n86iijadkp6lgcfuagp753oat"
        VITE_COGNITO_DOMAIN: "saveenergy.auth.us-east-1.amazoncognito.com"
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    deploy:
      resources:
        limits:
          memory: 512M
